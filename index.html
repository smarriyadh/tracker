<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contract Progress Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f4f7fc; padding: 24px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    h1 { font-size: 1.8rem; font-weight: 600; color: #1e3c72; }
    .employee-input { background: white; padding: 8px 20px; border-radius: 40px; display: flex; align-items: center; gap: 12px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 32px; }
    .kpi-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; }
    .kpi-value { font-size: 2rem; font-weight: 700; color: #1f4f82; }
    .tabs { display: flex; gap: 8px; margin: 20px 0; border-bottom: 1px solid #cbd5e1; }
    .tab-btn { background: none; border: none; padding: 10px 24px; cursor: pointer; border-radius: 30px; }
    .tab-btn.active { background: #1f4f82; color: white; }
    .table-container { background: white; border-radius: 24px; padding: 20px; overflow-x: auto; }
    .btn { background: #1f4f82; border: none; color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin: 4px; }
    .btn-outline { background: transparent; border: 1px solid #1f4f82; color: #1f4f82; }
    .status { background: #e2e8f0; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 16px; }
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal-content { background: white; border-radius: 32px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-chart-line"></i> Contract Progress Tracker</h1>
    <div class="employee-input">
      <label><i class="fas fa-user-check"></i> Your name:</label>
      <input type="text" id="employeeName" placeholder="e.g. Ahmed" required>
    </div>
  </div>
  <div id="status" class="status">Loading data...</div>
  <div class="kpi-grid" id="kpi-cards"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="contracts">📋 Contracts</button>
    <button class="tab-btn" data-tab="progress">📈 Progress Log</button>
    <button class="tab-btn" data-tab="dashboard">📊 Dashboard</button>
  </div>
  <div id="contracts-tab">
    <div style="margin-bottom: 20px;">
      <button class="btn" id="addContractBtn"><i class="fas fa-plus"></i> New Contract</button>
      <button class="btn" id="importBtn"><i class="fas fa-upload"></i> Import Excel/CSV</button>
      <button class="btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh Data</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">
    </div>
    <div class="table-container">
      <table id="contractsTable" class="display" style="width:100%"></table>
    </div>
  </div>
  <div id="progress-tab" style="display:none;">
    <div class="table-container"><table id="progressTable" class="display"></table></div>
  </div>
  <div id="dashboard-tab" style="display:none;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <canvas id="professionChart"></canvas>
      <canvas id="nationalityChart"></canvas>
    </div>
  </div>
</div>

<div id="contractModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">Add/Edit Contract</h2>
    <form id="contractForm" class="form-grid">
      <div id="form-fields"></div>
      <div style="grid-column: span 2; text-align: right;">
        <button type="button" class="btn-outline" id="closeModal">Cancel</button>
        <button type="submit" class="btn">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
const API_URL = 'const API_URL = 'https://script.google.com/macros/s/AKfycbzsbtlyTq-L7-hJSSBC7EnBYrRtlu_CDhvE__l24z4wibjBtb8Zf6LTjxjogxLk4Iw/exec';
';
let contractsData = [];
let dataTable, progressTable;
let professionChart, nationalityChart;

const FIELDS = [
  { name: 'serial', label: 'Serial (المسلسل)', type: 'text' },
  { name: 'contractNumber', label: 'Contract Number (رقم العقد)', type: 'text', required: true },
  { name: 'employerId', label: 'Employer ID (هوية صاحب العمل)', type: 'text' },
  { name: 'issueNumber', label: 'Issue Number (رقم الصادر)', type: 'text' },
  { name: 'profession', label: 'Profession (المهنة)', type: 'text' },
  { name: 'nationality', label: 'Nationality (الجنسية)', type: 'text' },
  { name: 'amountDue', label: 'Amount Due (المبلغ المستحق)', type: 'number' },
  { name: 'recruitmentDuration', label: 'Duration (مدة الاستقدام)', type: 'text' },
  { name: 'contractStatus', label: 'Contract Status (حالة العقد)', type: 'select', options: ['New','Visa Processing','Worker Arrived','Contract Started','Completed','Cancelled'] },
  { name: 'startDate', label: 'Start Date (تاريخ بداية العقد)', type: 'date' },
  { name: 'clientName', label: 'Client Name (اسم العميل)', type: 'text' },
  { name: 'legacyStatus', label: 'Legacy Status (الحالة)', type: 'text' }
];

async function apiCall(action, data = null, employeeName = null, contracts = null) {
  let url = `${API_URL}?action=${action}`;
  const options = { method: 'GET' };
  if (data || contracts) {
    options.method = 'POST';
    options.headers = { 'Content-Type': 'application/json' };
    const payload = {};
    if (data) { payload.data = data; payload.employeeName = employeeName; }
    if (contracts) { payload.contracts = contracts; payload.employeeName = employeeName; }
    options.body = JSON.stringify(payload);
  }
  const res = await fetch(url, options);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'API error');
  return json.data;
}

async function loadContracts() {
  document.getElementById('status').innerText = 'Loading contracts...';
  try {
    contractsData = await apiCall('getContracts');
    renderContractsTable();
    await updateKPIs();
    document.getElementById('status').innerText = `✅ Loaded ${contractsData.length} contracts`;
  } catch (err) {
    document.getElementById('status').innerText = `❌ Error: ${err.message}`;
    console.error(err);
  }
}

function renderContractsTable() {
  const columns = [
    { data: 'contractNumber', title: 'Contract #' },
    { data: 'clientName', title: 'Client' },
    { data: 'profession', title: 'Profession' },
    { data: 'contractStatus', title: 'Status' },
    { data: 'legacyStatus', title: 'Legacy Status' },
    { data: 'amountDue', title: 'Amount Due' },
    { data: null, title: 'Actions', render: (data) => `<button class="btn-outline edit-btn" data-id="${data.contractNumber}">Edit</button>` }
  ];
  if (!dataTable) {
    dataTable = $('#contractsTable').DataTable({ data: contractsData, columns, pageLength: 15 });
  } else {
    dataTable.clear().rows.add(contractsData).draw();
  }
  $('#contractsTable tbody').off('click', '.edit-btn').on('click', '.edit-btn', function() {
    openModal($(this).data('id'));
  });
}

async function loadProgressLog() {
  try {
    const log = await apiCall('getProgressLog');
    if (progressTable) {
      progressTable.clear().rows.add(log).draw();
    } else {
      progressTable = $('#progressTable').DataTable({
        data: log,
        columns: [
          { data: 'timestamp', title: 'Timestamp' },
          { data: 'contractNumber', title: 'Contract #' },
          { data: 'employeeName', title: 'Employee' },
          { data: 'oldStatus', title: 'Old Status' },
          { data: 'newStatus', title: 'New Status' },
          { data: 'fieldChanged', title: 'Field' }
        ],
        order: [[0, 'desc']],
        pageLength: 20
      });
    }
  } catch (err) { console.error(err); }
}

async function updateKPIs() {
  const dashboard = await apiCall('getDashboard');
  const { totalContracts, activeContracts, totalAmountDue, byProfession, byNationality } = dashboard;
  document.getElementById('kpi-cards').innerHTML = `
    <div class="kpi-card"><h3>Total Contracts</h3><div class="kpi-value">${totalContracts}</div></div>
    <div class="kpi-card"><h3>Active Contracts</h3><div class="kpi-value">${activeContracts}</div></div>
    <div class="kpi-card"><h3>Total Amount Due</h3><div class="kpi-value">${totalAmountDue.toFixed(2)}</div></div>
  `;
  if (professionChart) professionChart.destroy();
  if (nationalityChart) nationalityChart.destroy();
  professionChart = new Chart(document.getElementById('professionChart'), {
    type: 'bar',
    data: { labels: Object.keys(byProfession), datasets: [{ label: '# Contracts', data: Object.values(byProfession), backgroundColor: '#3b82f6' }] }
  });
  nationalityChart = new Chart(document.getElementById('nationalityChart'), {
    type: 'pie',
    data: { labels: Object.keys(byNationality), datasets: [{ data: Object.values(byNationality), backgroundColor: ['#f59e0b','#10b981','#ef4444','#8b5cf6'] }] }
  });
}

function openModal(contractNumber = null) {
  const modal = document.getElementById('contractModal');
  const formFields = document.getElementById('form-fields');
  let contract = contractNumber ? contractsData.find(c => c.contractNumber == contractNumber) : {};
  modal.style.display = 'flex';
  document.getElementById('modalTitle').innerText = contractNumber ? 'Edit Contract' : 'New Contract';
  formFields.innerHTML = FIELDS.map(f => `
    <div class="form-field">
      <label>${f.label}</label>
      ${f.type === 'select' ? `<select name="${f.name}" ${f.required ? 'required' : ''}>${f.options.map(opt => `<option ${contract[f.name]==opt ? 'selected' : ''}>${opt}</option>`).join('')}</select>` :
        `<input type="${f.type}" name="${f.name}" value="${contract[f.name] || ''}" ${f.required ? 'required' : ''}>`}
    </div>
  `).join('');
  document.getElementById('contractForm').onsubmit = async (e) => {
    e.preventDefault();
    const employeeName = document.getElementById('employeeName').value.trim();
    if (!employeeName) { alert('Enter your name'); return; }
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    data.contractNumber = contractNumber || data.contractNumber;
    const action = contractNumber ? 'updateContract' : 'addContract';
    try {
      await apiCall(action, data, employeeName);
      closeModal();
      loadContracts();
      if (action === 'updateContract') loadProgressLog();
    } catch (err) { alert('Error: ' + err.message); }
  };
}

function closeModal() { document.getElementById('contractModal').style.display = 'none'; }

async function importFile(file) {
  const extension = file.name.split('.').pop().toLowerCase();
  let rows = [];
  if (extension === 'csv') {
    const text = await file.text();
    rows = text.split(/\r?\n/).map(line => line.split(',').map(cell => cell.trim().replace(/^"|"$/g, '')));
  } else if (extension === 'xlsx' || extension === 'xls') {
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
  } else { alert('Unsupported file'); return; }
  if (rows.length < 2) { alert('No data rows'); return; }
  const headers = rows[0].map(c => String(c || '').trim());
  const expected = ['المسلسل','رقم العقد','هوية صاحب العمل','رقم الصادر','المهنة','الجنسية','المبلغ المستحق','مدة الاستقدام','حالة العقد','تاريخ بداية العقد','اسم العميل','الحالة'];
  for (let i=0; i<expected.length; i++) {
    if (headers[i] !== expected[i]) {
      alert(`Header mismatch at column ${i+1}: expected "${expected[i]}" got "${headers[i]}"`);
      return;
    }
  }
  const contracts = [];
  for (let i=1; i<rows.length; i++) {
    const r = rows[i];
    if (r.length < 12) continue;
    contracts.push({
      serial: r[0]?.toString().trim() || '',
      contractNumber: r[1]?.toString().trim() || '',
      employerId: r[2]?.toString().trim() || '',
      issueNumber: r[3]?.toString().trim() || '',
      profession: r[4]?.toString().trim() || '',
      nationality: r[5]?.toString().trim() || '',
      amountDue: r[6]?.toString().trim() || '',
      recruitmentDuration: r[7]?.toString().trim() || '',
      contractStatus: r[8]?.toString().trim() || '',
      startDate: r[9]?.toString().trim() || '',
      clientName: r[10]?.toString().trim() || '',
      legacyStatus: r[11]?.toString().trim() || ''
    });
  }
  const employeeName = document.getElementById('employeeName').value.trim();
  if (!employeeName) { alert('Enter your name'); return; }
  document.getElementById('status').innerText = 'Importing...';
  try {
    const result = await apiCall('bulkImport', null, employeeName, contracts);
    alert(`Imported ${result.added} new contracts, skipped ${result.skipped} duplicates.`);
    await loadContracts();
  } catch (err) {
    alert('Import failed: ' + err.message);
    document.getElementById('status').innerText = 'Import failed';
  }
}

function switchTab(tab) {
  document.getElementById('contracts-tab').style.display = tab === 'contracts' ? 'block' : 'none';
  document.getElementById('progress-tab').style.display = tab === 'progress' ? 'block' : 'none';
  document.getElementById('dashboard-tab').style.display = tab === 'dashboard' ? 'block' : 'none';
  if (tab === 'progress') loadProgressLog();
}

document.getElementById('addContractBtn').onclick = () => openModal();
document.getElementById('closeModal').onclick = closeModal;
document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('refreshBtn').onclick = () => loadContracts();
document.getElementById('fileInput').onchange = async (e) => { if (e.target.files.length) await importFile(e.target.files[0]); e.target.value = ''; };
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
window.onload = () => { loadContracts(); switchTab('contracts'); };
</script>
</body>
</html>
