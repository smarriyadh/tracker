<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - تحديث العقود</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0;}
        .card { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-upload { background: #3b82f6; } .btn-upload:hover { background: #2563eb; }
        .btn-update { background: #10b981; } .btn-update:hover { background: #059669; }
        .status-msg { margin-top: 15px; padding: 10px; border-radius: 5px; text-align: center; display: none; font-weight: bold; }
        .success { background: #dcfce3; color: #166534; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        .info { background: #e0f2fe; color: #075985; display: block; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 بوابة إدخال البيانات</h2>
    <div id="statusMsg" class="status-msg"></div>

    <div class="card">
        <h3>📂 1. رفع ملف إكسل (عقود جديدة)</h3>
        <p style="font-size: 14px; color: #64748b;">قم برفع ملف Excel أو CSV لإضافة العقود الجديدة إلى قاعدة البيانات.</p>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">اختر الملف للرفع</button>
    </div>

    <div class="card">
        <h3>🔄 2. تحديث حالة عقد فردي</h3>
        <label>رقم العقد:</label>
        <input type="text" id="contractNum" placeholder="أدخل رقم العقد هنا...">
        
        <label>الحالة الجديدة:</label>
        <select id="newStatus">
            <option value="New">جديد</option>
            <option value="Visa Processing">قيد المعالجة (تأشيرة)</option>
            <option value="Worker Arrived">وصول العامل</option>
            <option value="Contract Started">بدء العقد</option>
            <option value="Completed">مكتمل</option>
            <option value="Cancelled">ملغي</option>
        </select>
        
        <button class="btn-update" onclick="updateSingleContract()">تحديث الحالة</button>
    </div>
</div>

<script>
    // ⚠️ REPLACE WITH YOUR DEPLOYED APP SCRIPT URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbyLyLhDE18tyfaEFbvBcBANDOz_qe4E7gO_7qc74m7ly5vmIhMXxECCVVo2iDa-tkQ/exec';

    function setStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.innerText = msg;
        el.className = `status-msg ${type}`;
        if(type !== 'error') setTimeout(() => el.className = 'status-msg', 5000);
    }

    async function apiCall(action, payload) {
        const url = `${API_URL}?action=${action}`;
        const response = await fetch(url, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });
        const json = await response.json();
        if (!json.success) throw new Error(json.error);
        return json.data;
    }

    async function updateSingleContract() {
        const cNum = document.getElementById('contractNum').value.trim();
        const status = document.getElementById('newStatus').value;
        if (!cNum) return setStatus('الرجاء إدخال رقم العقد', 'error');

        setStatus('جاري التحديث...', 'info');
        try {
            await apiCall('updateStatus', { contractNumber: cNum, newStatus: status, updatedBy: 'Staff' });
            setStatus('✅ تم التحديث بنجاح', 'success');
            document.getElementById('contractNum').value = '';
        } catch (err) {
            setStatus('❌ خطأ: ' + err.message, 'error');
        }
    }

    // Excel Parsing Logic
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        if (!e.target.files.length) return;
        const file = e.target.files[0];
        setStatus('جاري قراءة الملف...', 'info');
        
        try {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });
            
            const contractsToImport = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (r.length < 13 || !r[1]) continue;
                contractsToImport.push({
                    serial: r[0], contractNumber: r[1], employerId: r[2], issueNumber: r[3],
                    profession: r[4], nationality: r[5], amountDue: r[6], recruitmentDuration: r[7],
                    contractStatus: r[8] || 'New', startDate: r[9], clientName: r[10], legacyStatus: r[11], employeeName: r[12]
                });
            }
            if (!contractsToImport.length) throw new Error('لم يتم العثور على بيانات صحيحة');

            setStatus(`جاري رفع ${contractsToImport.length} عقد...`, 'info');
            const res = await apiCall('bulkImport', { contracts: contractsToImport });
            setStatus(`✅ اكتمل الرفع: تمت إضافة ${res.added}، وتخطي ${res.skipped} مكرر`, 'success');
        } catch (err) {
            setStatus('❌ فشل الرفع: ' + err.message, 'error');
        }
        e.target.value = ''; // Reset input
    });
</script>
</body>
</html>
