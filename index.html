<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة عقود الاستقدام</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
    .nav-item.active { background-color: #10b981; color: white; }
    .loader { border-top-color: #10b981; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .table-responsive { overflow-x: auto; }
  </style>
</head>
<body class="text-gray-800">

  <div class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-white shadow-lg hidden md:flex flex-col">
      <div class="p-6 text-center border-b">
        <h1 class="text-2xl font-bold text-emerald-600">نظام الاستقدام</h1>
        <p class="text-sm text-gray-500 mt-1">إدارة العقود الذكية</p>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <button onclick="showSection('dashboard')" id="nav-dashboard" class="nav-item active w-full text-right px-4 py-3 rounded-lg hover:bg-emerald-50 transition">📊 لوحة التحكم</button>
        <button onclick="showSection('contracts')" id="nav-contracts" class="nav-item w-full text-right px-4 py-3 rounded-lg hover:bg-emerald-50 transition">📁 إدارة العقود</button>
        <button onclick="showSection('add')" id="nav-add" class="nav-item w-full text-right px-4 py-3 rounded-lg hover:bg-emerald-50 transition">➕ إضافة عقد جديد</button>
      </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
      <section id="dashboard" class="space-y-6">
        <h2 class="text-2xl font-bold mb-4">نظرة عامة</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white p-6 rounded-xl shadow-sm border-r-4 border-emerald-500">
            <p class="text-gray-500">إجمالي العقود</p>
            <p class="text-3xl font-bold" id="stat-total">جاري التحميل...</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border-r-4 border-blue-500">
            <p class="text-gray-500">قيد الإجراء</p>
            <p class="text-3xl font-bold" id="stat-pending">جاري التحميل...</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border-r-4 border-green-500">
            <p class="text-gray-500">تم الوصول</p>
            <p class="text-3xl font-bold" id="stat-arrived">جاري التحميل...</p>
          </div>
        </div>
      </section>

      <section id="contracts" class="hidden space-y-6">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-bold">سجل العقود</h2>
          <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 بحث برقم العقد أو اسم العميل..." class="border rounded-lg px-4 py-2 w-full md:w-1/3 focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden table-responsive">
          <table class="w-full text-right">
            <thead class="bg-gray-50 text-gray-600 font-semibold border-b">
              <tr>
                <th class="p-4">رقم العقد</th>
                <th class="p-4">العميل</th>
                <th class="p-4">المهنة</th>
                <th class="p-4">الدولة</th>
                <th class="p-4">تاريخ التقديم</th>
                <th class="p-4">تاريخ الوصول</th>
                <th class="p-4">الحالة</th>
                <th class="p-4">إجراء</th>
              </tr>
            </thead>
            <tbody id="contractsTableBody" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </section>

      <section id="add" class="hidden max-w-3xl mx-auto">
        <h2 class="text-2xl font-bold mb-6">تسجيل عقد استقدام جديد</h2>
        <form id="contractForm" onsubmit="handleFormSubmit(event)" class="bg-white p-8 rounded-xl shadow-sm space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">اسم العميل</label><input type="text" name="clientName" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">رقم جوال العميل (رقم العميل)</label><input type="text" name="clientPhone" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">اسم العاملة</label><input type="text" name="workerName" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">المهنة</label>
              <select name="profession" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                <option value="عامله منزليه">عامله منزليه</option>
                <option value="سائق خاص">سائق خاص</option>
                <option value="طباخ منزلي">طباخ منزلي</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">الدولة</label>
              <select name="country" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                <option value="اثيوبيا">اثيوبيا</option>
                <option value="الفلبين">الفلبين</option>
                <option value="كينيا">كينيا</option>
              </select>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">تاريخ الوصول</label><input type="date" name="expectedArrival" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">رقم الهوية</label><input type="text" name="idNumber" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">رقم التأشيرة</label><input type="text" name="visaNumber" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">مدة العقد</label><input type="number" name="contractDuration" value="90" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">السعر المعتمد</label><input type="number" step="0.01" name="price" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
            <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">اسم الوكيل / المكتب</label><input type="text" name="agent" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none"></div>
          </div>
          <div class="pt-4 border-t flex justify-end gap-3">
            <button type="button" onclick="showSection('contracts')" class="px-6 py-2 border rounded-lg hover:bg-gray-50">إلغاء</button>
            <button type="submit" id="submitBtn" class="bg-emerald-600 text-white px-8 py-2 rounded-lg hover:bg-emerald-700 transition flex items-center gap-2">
              <span>حفظ العقد</span>
            </button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div id="toast" class="fixed bottom-5 left-5 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <span id="toastMessage"></span>
  </div>

  <script>
    // ⚠️ استبدل هذا الرابط برابط الـ Web App الفعلي بعد إعادة نشر السكريبت (New Deployment)
    const API_URL = "https://script.google.com/macros/s/AKfycbzObJfK_jrnI-SNBbKjhw8nCk3Ad8pHELeXcNqY9y_T2SALQacLtzjMoQsBKAaFBx4/exec"; 

    function showSection(sectionId) {
      document.querySelectorAll('section').forEach(sec => sec.classList.add('hidden'));
      document.getElementById(sectionId).classList.remove('hidden');
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      document.getElementById('nav-' + sectionId).classList.add('active');
      if (sectionId === 'contracts' || sectionId === 'dashboard') loadData();
    }

    let allContracts = [];
    async function loadData() {
      document.getElementById('stat-total').innerText = 'جاري التحميل...';
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        allContracts = data;
        updateDashboard();
        renderTable(allContracts);
      } catch (error) {
        showToast('فشل الاتصال بالخادم عند جلب البيانات', 'error');
      }
    }

    function updateDashboard() {
      document.getElementById('stat-total').innerText = allContracts.length;
      document.getElementById('stat-pending').innerText = allContracts.filter(c => c.status === 'تحت الإجراء' || c.status === 'بانتظار التأشيرة').length;
      document.getElementById('stat-arrived').innerText = allContracts.filter(c => c.status === 'تم الوصول').length;
    }

    function renderTable(data) {
      const tbody = document.getElementById('contractsTableBody');
      tbody.innerHTML = '';
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="p-8 text-center text-gray-500">لا توجد عقود مطابقة</td></tr>';
        return;
      }
      data.forEach(contract => {
        let statusColor = 'bg-gray-100 text-gray-800';
        if (contract.status === 'تم الوصول') statusColor = 'bg-green-100 text-green-800';
        else if (contract.status === 'تحت الإجراء') statusColor = 'bg-yellow-100 text-yellow-800';
        else if (contract.status === 'بانتظار التأشيرة') statusColor = 'bg-blue-100 text-blue-800';
        else if (contract.status === 'ملغي') statusColor = 'bg-red-100 text-red-800';

        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 transition';
        tr.innerHTML = `
          <td class="p-4 font-medium text-emerald-700">${contract.id || ''}</td>
          <td class="p-4">${contract.clientName || ''}</td>
          <td class="p-4">${contract.profession || ''}</td>
          <td class="p-4">${contract.country || ''}</td>
          <td class="p-4 text-sm text-gray-600">${contract.submissionDate || ''}</td>
          <td class="p-4 text-sm text-gray-600">${contract.expectedArrival || ''}</td>
          <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-semibold ${statusColor}">${contract.status || 'تحت الإجراء'}</span></td>
          <td class="p-4">
            <select onchange="updateStatus(${contract.rowIndex}, this.value)" class="text-sm border rounded px-2 py-1 bg-white focus:ring-2 focus:ring-emerald-500 outline-none">
              <option value="تحت الإجراء" ${contract.status === 'تحت الإجراء' ? 'selected' : ''}>تحت الإجراء</option>
              <option value="بانتظار التأشيرة" ${contract.status === 'بانتظار التأشيرة' ? 'selected' : ''}>بانتظار التأشيرة</option>
              <option value="تم الوصول" ${contract.status === 'تم الوصول' ? 'selected' : ''}>تم الوصول</option>
              <option value="ملغي" ${contract.status === 'ملغي' ? 'selected' : ''}>ملغي</option>
            </select>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filterTable() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      renderTable(allContracts.filter(c => 
        (c.id && c.id.toString().toLowerCase().includes(query)) || 
        (c.clientName && c.clientName.toLowerCase().includes(query))
      ));
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5"></div> جاري الحفظ...';

      const formData = new FormData(e.target);
      const formObject = Object.fromEntries(formData.entries());

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          mode: 'cors',
          redirect: 'follow',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'add', data: formObject })
        });
        const result = await response.json();
        
        if (result.success) {
          e.target.reset();
          showToast(result.message, 'success');
          showSection('contracts');
        } else {
          showToast(result.error || 'حدث خطأ أثناء الحفظ', 'error');
        }
      } catch (error) {
        showToast('فشل الاتصال بالخادم أثناء إرسال البيانات', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>حفظ العقد</span>';
      }
    }

    async function updateStatus(rowIndex, newStatus) {
      showToast('جاري التحديث واستصدار التنبيهات...', 'info');
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          mode: 'cors',
          redirect: 'follow',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'update', rowIndex: rowIndex, newStatus: newStatus })
        });
        const result = await response.json();
        showToast(result.message, result.success ? 'success' : 'error');
        if (result.success) loadData();
      } catch (error) {
        showToast('فشل الاتصال بالخادم، لم يتم تحديث الحالة', 'error');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').innerText = message;
      toast.className = `fixed bottom-5 left-5 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 z-50 text-white ${
        type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'
      }`;
      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3500);
    }

    window.onload = () => loadData();
  </script>
</body>
</html>
