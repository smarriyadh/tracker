<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Status Tracker</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background: #f4f6f9; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1, h3 { color: #1a202c; }
        .toolbar { margin: 20px 0; display: flex; gap: 12px; flex-wrap: wrap; }
        button { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s;}
        button:hover { background: #1d4ed8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: left; }
        th { background: #f8fafc; font-weight: 600; color: #475569; }
        .status-select { padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1; }
        .update-btn { background: #059669; font-size: 13px; padding: 6px 12px; }
        .update-btn:hover { background: #047857; }
        .status-msg { margin: 10px 0; padding: 12px; border-radius: 6px; font-weight: 500; display: none; }
        .status-msg.visible { display: block; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Contract Status Tracker</h1>
    
    <div class="toolbar">
        <button id="testBtn" style="background:#475569;">📡 Test Connection</button>
        <button id="refreshBtn">🔄 Refresh Data</button>
        <button id="importBtn">📂 Upload Excel/CSV</button>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
    </div>
    
    <div id="statusMsg" class="status-msg"></div>
    
    <h3>📄 Contracts</h3>
    <div style="overflow-x: auto;">
        <table id="contractsTable">
            <thead>
                <tr><th>رقم العقد</th><th>اسم العميل</th><th>المهنة</th><th>حالة العقد</th><th>الحالة</th><th>اسم الموظف</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="7">Ready to load...</td></tr></tbody>
        </table>
    </div>

    <div style="margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
        <h3>📜 Progress Log</h3>
        <div style="overflow-x: auto;">
            <table id="logTable">
                <thead><tr><th>Timestamp</th><th>Contract #</th><th>Updated By</th><th>Old Status</th><th>New Status</th></tr></thead>
                <tbody id="logBody"><tr><td colspan="5">Ready to load...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 👇👇👇 REPLACE WITH YOUR NEW DEPLOYMENT URL 👇👇👇
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZU4cgAVwEr0ZdMomw75D7PUbzH-V9_udnfopPDYnbvi2Bf86sXJ63JaQjUNXUlgE/exec'; 

    async function apiCall(action, payload = null) {
        if (API_URL === 'YOUR_WEB_APP_URL_HERE') {
            throw new Error("You must replace API_URL in the HTML with your Google Apps Script Web App URL.");
        }

        const url = `${API_URL}?action=${action}`;
        const options = { redirect: 'follow' };

        // Setting method to POST and Content-Type to text/plain is the secret to avoiding CORS
        if (payload) {
            options.method = 'POST';
            options.headers = { 'Content-Type': 'text/plain;charset=utf-8' }; 
            options.body = JSON.stringify(payload);
        } else {
            options.method = 'GET';
        }

        try {
            const response = await fetch(url, options);
            const text = await response.text();
            
            let json;
            try {
                json = JSON.parse(text);
            } catch (e) {
                // If Google returns an HTML login page or error page, JSON parse fails here.
                console.error("Raw response from server:", text);
                throw new Error("Server returned an HTML page. This means your script deployment permissions are NOT set to 'Anyone', or the script crashed fatally.");
            }

            if (!json.success) throw new Error(json.error);
            return json.data;

        } catch (error) {
            console.error("API Call Failed:", error);
            throw error;
        }
    }

    // --- UI FUNCTIONS ---
    function setStatus(msg, type = 'info') {
        const el = document.getElementById('statusMsg');
        el.innerText = msg;
        el.className = `status-msg visible ${type}`;
        if (type !== 'error') setTimeout(() => el.className = 'status-msg', 4000);
    }

    function escapeHtml(str) {
        return String(str || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
    }

    // --- CORE FEATURES ---
    async function testConnection() {
        setStatus("Pinging server...", "info");
        try {
            const res = await apiCall('ping');
            setStatus("✅ Success! " + res, "success");
        } catch (err) {
            setStatus("❌ Connection failed: " + err.message, "error");
        }
    }

    async function loadContracts() {
        setStatus('Loading contracts...', 'info');
        try {
            const contracts = await apiCall('getContracts');
            renderContractsTable(contracts);
            await loadProgressLog();
            setStatus(`✅ Loaded ${contracts.length} contracts`, 'success');
        } catch (err) {
            setStatus('Error loading data: ' + err.message, 'error');
        }
    }

    function renderContractsTable(contracts) {
        const tbody = document.getElementById('tableBody');
        if (!contracts.length) {
            tbody.innerHTML = '<tr><td colspan="7">No contracts found. Upload some data!</td></tr>';
            return;
        }
        
        const statuses = ['New', 'Visa Processing', 'Worker Arrived', 'Contract Started', 'Completed', 'Cancelled'];
        
        tbody.innerHTML = contracts.map(c => `
            <tr>
                <td>${escapeHtml(c.contractNumber)}</td>
                <td>${escapeHtml(c.clientName)}</td>
                <td>${escapeHtml(c.profession)}</td>
                <td>
                    <select class="status-select" data-id="${escapeHtml(c.contractNumber)}">
                        ${statuses.map(s => `<option ${c.contractStatus === s ? 'selected' : ''}>${s}</option>`).join('')}
                    </select>
                </td>
                <td>${escapeHtml(c.legacyStatus)}</td>
                <td>${escapeHtml(c.employeeName)}</td>
                <td><button class="update-btn" data-id="${escapeHtml(c.contractNumber)}">Update</button></td>
            </tr>
        `).join('');

        document.querySelectorAll('.update-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                const newStatus = document.querySelector(`.status-select[data-id="${id}"]`).value;
                await updateStatus(id, newStatus);
            });
        });
    }

    async function updateStatus(contractNumber, newStatus) {
        setStatus(`Updating ${contractNumber}...`, 'info');
        try {
            const result = await apiCall('updateStatus', { contractNumber, newStatus, updatedBy: 'Admin' });
            if (result.unchanged) {
                setStatus(`Status was already "${newStatus}"`, 'info');
            } else {
                setStatus(`✅ Updated! ${result.oldStatus} → ${result.newStatus}`, 'success');
                await loadContracts(); // Refresh
            }
        } catch (err) {
            setStatus(`Update failed: ${err.message}`, 'error');
        }
    }

    async function loadProgressLog() {
        try {
            const log = await apiCall('getProgress');
            const tbody = document.getElementById('logBody');
            if (!log.length) {
                tbody.innerHTML = '<tr><td colspan="5">No progress entries yet</td></tr>';
                return;
            }
            tbody.innerHTML = log.map(e => `
                <tr>
                    <td>${new Date(e.timestamp).toLocaleString()}</td>
                    <td>${escapeHtml(e.contractNumber)}</td>
                    <td>${escapeHtml(e.updatedBy)}</td>
                    <td>${escapeHtml(e.oldStatus)}</td>
                    <td>${escapeHtml(e.newStatus)}</td>
                </tr>
            `).join('');
        } catch (err) {
            console.error('Progress log error:', err);
        }
    }

    // --- IMPORT LOGIC ---
    async function processFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        let rows = [];
        
        try {
            if (ext === 'csv') {
                const text = await file.text();
                rows = text.split(/\r?\n/).map(line => line.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
            } else if (ext === 'xlsx' || ext === 'xls') {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data);
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            } else {
                throw new Error('Unsupported file type. Use .csv or .xlsx');
            }

            if (rows.length < 2) throw new Error('No data found in file');

            // Quick mapping based on your expected indices
            const contractsToImport = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (r.length < 13 || !r[1]) continue; // Skip bad rows or missing contract numbers
                
                contractsToImport.push({
                    serial: r[0], contractNumber: r[1], employerId: r[2], issueNumber: r[3],
                    profession: r[4], nationality: r[5], amountDue: r[6], recruitmentDuration: r[7],
                    contractStatus: r[8], startDate: r[9], clientName: r[10], legacyStatus: r[11], employeeName: r[12]
                });
            }

            if (contractsToImport.length === 0) throw new Error('Could not parse valid contracts from file');

            setStatus(`Importing ${contractsToImport.length} contracts...`, 'info');
            const result = await apiCall('bulkImport', { contracts: contractsToImport });
            setStatus(`✅ Imported ${result.added} new. Skipped ${result.skipped} duplicates.`, 'success');
            await loadContracts();

        } catch (err) {
            setStatus('Import failed: ' + err.message, 'error');
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('testBtn').onclick = testConnection;
    document.getElementById('refreshBtn').onclick = loadContracts;
    document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => {
        if (e.target.files.length) processFile(e.target.files[0]);
        e.target.value = '';
    };

    window.onload = loadContracts;
</script>
</body>
</html>
