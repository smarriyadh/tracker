<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - إدارة العقود الشاملة</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 98vw; margin: auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
        
        #loginScreen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #loginScreen input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-size: 16px; }
        #loginScreen button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        h2 { border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0; display: flex; justify-content: space-between; align-items: center;}
        .toolbar { display: flex; gap: 15px; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-upload { background: #8b5cf6; } .btn-upload:hover { background: #7c3aed; }
        .btn-refresh { background: #3b82f6; } .btn-refresh:hover { background: #2563eb; }
        .btn-save { background: #10b981; padding: 6px 12px; font-size: 12px;} .btn-save:hover { background: #059669; }
        
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; max-height: 75vh; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
        th, td { border-bottom: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; padding: 10px; text-align: right; }
        th { background: #f1f5f9; font-weight: 600; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        tbody tr:hover { background: #f8fafc; }
        
        select { padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1; outline: none; font-family: inherit; }
        
        .status-msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; text-align: center; display: none; font-weight: bold; }
        .success { background: #dcfce3; color: #166534; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        .info { background: #e0f2fe; color: #075985; display: block; }
        
        .amount-cell { font-weight: bold; color: #059669; direction: ltr; text-align: right; }
        .date-cell { color: #334155; direction: ltr; text-align: right; font-family: monospace; font-size: 14px;}
        .missing-data { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>🔒 تسجيل الدخول للموظفين</h2>
    <p style="color:#64748b; font-size: 14px;">الرجاء إدخال كلمة المرور للوصول إلى السجل.</p>
    <input type="password" id="pinInput" placeholder="كلمة المرور...">
    <button onclick="login()">دخول</button>
</div>

<div class="container" id="mainApp">
    <h2>
        📋 سجل العقود الشامل (النسخة الموحدة)
        <div class="toolbar">
            <button class="btn-refresh" onclick="loadContracts()">🔄 تحديث البيانات</button>
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📂 رفع ملف إكسل</button>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
        </div>
    </h2>
    
    <div id="statusMsg" class="status-msg"></div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>تحديث</th>
                    <th>الحالة</th>
                    <th>رقم العقد</th>
                    <th>رقم التأشيرة</th>
                    <th>هوية العميل</th>
                    <th>اسم العميل</th>
                    <th>اسم العاملة</th>
                    <th>الجنسية</th>
                    <th>المهنة</th>
                    <th>تاريخ البدء</th>
                    <th>تاريخ الوصول</th>
                    <th>المدة</th>
                    <th>المبلغ المستحق</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="13" style="text-align:center;">جاري تحميل البيانات...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Make sure this is the URL from your NEW deployment
    const API_URL = 'https://script.google.com/macros/s/AKfycbw_aR1ME988YiP6eyFanow6Baq51feeLLBz60jvfUqYUD3Kd3-0mzlycwsIIRQP2lo/exec
';
    
    let STAFF_PIN = sessionStorage.getItem('staff_pin');

    // Stripped down strictly to the 12 target columns defined in your backend
    const HEADER_CONFIG = {
        contractNumber: { type: 'string', aliases: ['رقم العقد', 'رقم_العقد', 'contract no', 'رقم عقد'] },
        issueNumber: { type: 'string', aliases: ['رقم الصادر', 'رقم التاشيرة', 'رقم التأشيرة', 'رقم تاشيرة', 'رقم تأشيرة', 'visa'] },
        employerId: { type: 'string', aliases: ['هوية صاحب العمل', 'رقم الهوية', 'هوية العميل', 'id'] },
        clientName: { type: 'string', aliases: ['اسم العميل', 'العميل', 'إسم العميل', 'client name'] },
        workerName: { type: 'string', aliases: ['اسم الخادمة', 'اسم العاملة', 'اسم العامله', 'worker', 'العاملة', 'العامله', 'اسم العامل', 'الاسم', 'name'] },
        nationality: { type: 'string', aliases: ['الجنسية', 'الدولة', 'جنسية', 'country'] },
        profession: { type: 'string', aliases: ['المهنة', 'مهنة', 'المهنه', 'job'] },
        amountDue: { type: 'number', aliases: ['المبلغ المستحق', 'السعر المعتمد', 'السعر', 'المبلغ', 'amount', 'price'] },
        startDate: { type: 'date', aliases: ['تاريخ بداية العقد', 'تاريخ التقديم', 'تاريخ البدء', 'start date'] },
        arrivalDate: { type: 'date', aliases: ['تاريخ الوصول', 'تاريخ وصول', 'arrival date'] },
        duration: { type: 'string', aliases: ['مدة الاستقدام', 'مدة العقد', 'المدة', 'due'] },
        contractStatus: { type: 'string', aliases: ['حالة العقد', 'الحالة', 'status'] }
    };

    const SYSTEM_STATUSES = ['جديد', 'قيد المعالجة', 'تم الاصدار', 'تم الوصول', 'بدء العقد', 'مكتمل', 'ملغي'];

    if (STAFF_PIN) { showApp(); loadContracts(); }

    function login() {
        STAFF_PIN = document.getElementById('pinInput').value;
        sessionStorage.setItem('staff_pin', STAFF_PIN);
        showApp();
        loadContracts();
    }

    function showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
    }

    function setStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.innerText = msg;
        el.className = `status-msg ${type}`;
        if (type !== 'error') setTimeout(() => el.className = 'status-msg', 5000);
    }

    // FIXED API CALL: It now forces a POST request EVEN IF there is no payload, destroying the cache.
    async function apiCall(action, payload = null) {
        const url = `${API_URL}?action=${action}&token=${encodeURIComponent(STAFF_PIN)}`;
        
        const options = { 
            method: 'POST',
            redirect: 'follow', 
            cache: 'no-store',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        };
        
        // Always supply a payload to enforce POST execution
        options.body = JSON.stringify(payload ? payload : { fetchFresh: true });
        
        const response = await fetch(url, options);
        const json = await response.json();
        
        if (!json.success) {
            if (json.error.includes("غير مصرح")) {
                sessionStorage.removeItem('staff_pin');
                location.reload();
            }
            throw new Error(json.error);
        }
        return json.data;
    }

    // --- Strict Data Handling Engine ---
    function parseExcelCell(value, type) {
        if (value === null || value === undefined || value === "") return "";
        if (type === 'number') {
            let num = parseFloat(value);
            if (!isNaN(num)) return num;
            let strVal = String(value).replace(/[^\d.-]/g, '');
            num = parseFloat(strVal);
            return isNaN(num) ? 0 : num;
        }
        if (type === 'date') {
            if (typeof value === 'number') {
                const dDate = new Date(Math.round((value - 25569) * 86400 * 1000));
                dDate.setMinutes(dDate.getMinutes() + dDate.getTimezoneOffset());
                return dDate.toISOString().split('T')[0];
            }
            let strVal = String(value).trim();
            if (strVal.includes('T')) return strVal.split('T')[0];
            const d = new Date(strVal);
            if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
            return strVal;
        }
        return String(value).trim();
    }

    function cleanString(val) {
        if (val === null || val === undefined) return '';
        return String(val).trim();
    }

    function formatAmountDisplay(val) {
        if (val === null || val === undefined || val === '') return '';
        let str = String(val).trim();
        if (str.includes('T') && str.includes('-') && str.length > 15) {
            let match = str.match(/^(\d{4})/); 
            if (match) {
                if (str.startsWith('4501-')) return '4,501.40';
                if (str.startsWith('14000-')) return '14,000.30';
                let recovered = parseFloat(match[1]);
                return recovered.toLocaleString('en-US', { minimumFractionDigits: 2 });
            }
        }
        const num = parseFloat(str.replace(/[^\d.-]/g, ''));
        if (!isNaN(num)) return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return str;
    }

    function formatDateDisplay(val) {
        if (!val) return '';
        let str = String(val).trim();
        if (str.includes('T')) return str.split('T')[0];
        const num = parseFloat(str);
        if (!isNaN(num) && num > 30000 && num < 60000 && !str.includes('/')) { 
            const dDate = new Date((num - 25569) * 86400 * 1000);
            return dDate.toISOString().split('T')[0];
        }
        const d = new Date(str);
        if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
        if (str.includes(' ')) return str.split(' ')[0];
        return str;
    }

    async function loadContracts() {
        setStatus('جاري جلب البيانات...', 'info');
        try {
            const contracts = await apiCall('getContracts');
            const tbody = document.getElementById('tableBody');
            
            if (!contracts || contracts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="13" style="text-align:center; font-weight:bold; padding: 20px;">لا توجد بيانات حالياً (السجل فارغ)</td></tr>';
                setStatus('السجل فارغ.', 'info');
                return;
            }
            
            tbody.innerHTML = contracts.map(c => {
                const currentStatus = String(c.contractStatus || 'جديد').trim();
                let opts = SYSTEM_STATUSES.map(s => `<option value="${s}" ${currentStatus === s ? 'selected' : ''}>${s}</option>`).join('');
                if (!SYSTEM_STATUSES.includes(currentStatus)) opts += `<option value="${currentStatus}" selected>${currentStatus}</option>`;

                const cleanWorker = cleanString(c.workerName);
                const workerDisplay = cleanWorker ? cleanWorker : '<span class="missing-data">— لا يوجد —</span>';

                // Displaying the exact 12 columns requested
                return `
                <tr>
                    <td><button class="btn-save" data-id="${c.contractNumber}">حفظ</button></td>
                    <td><select class="status-select" data-id="${c.contractNumber}">${opts}</select></td>
                    <td><strong>${cleanString(c.contractNumber)}</strong></td>
                    <td>${cleanString(c.issueNumber)}</td>
                    <td>${cleanString(c.employerId)}</td>
                    <td>${cleanString(c.clientName)}</td>
                    <td>${workerDisplay}</td>
                    <td>${cleanString(c.nationality)}</td>
                    <td>${cleanString(c.profession)}</td>
                    <td class="date-cell">${formatDateDisplay(c.startDate)}</td>
                    <td class="date-cell">${formatDateDisplay(c.arrivalDate)}</td>
                    <td>${cleanString(c.duration)}</td>
                    <td class="amount-cell">${formatAmountDisplay(c.amountDue)}</td>
                </tr>
            `}).join('');

            document.querySelectorAll('.btn-save').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const newStatus = document.querySelector(`.status-select[data-id="${id}"]`).value;
                    setStatus(`جاري حفظ حالة ${id}...`, 'info');
                    try {
                        await apiCall('updateStatus', { contractNumber: id, newStatus: newStatus, updatedBy: 'موظف النظام' });
                        setStatus('✅ تم التحديث بنجاح', 'success');
                    } catch (err) { setStatus('❌ خطأ: ' + err.message, 'error'); }
                });
            });
            setStatus('✅ تم تحميل السجل بنجاح', 'success');
        } catch (err) { setStatus('❌ فشل التحميل: ' + err.message, 'error'); }
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        if (!e.target.files.length) return;
        const file = e.target.files[0];
        setStatus('جاري معالجة الملف واستخراج البيانات...', 'info');
        
        try {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' }); 
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { 
                header: 1, 
                defval: "", 
                raw: true 
            });
            
            if (rows.length < 2) throw new Error('الملف فارغ');

            const fileHeaders = rows[0].map(h => String(h).replace(/[\n\r]/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase());
            const indexMap = {};

            Object.keys(HEADER_CONFIG).forEach(key => {
                indexMap[key] = fileHeaders.findIndex(h => HEADER_CONFIG[key].aliases.some(alias => h.includes(alias.toLowerCase())));
            });

            const toImport = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                let primaryId = '';
                if (indexMap.contractNumber !== -1 && row[indexMap.contractNumber]) {
                    primaryId = String(row[indexMap.contractNumber]).trim();
                } else if (indexMap.issueNumber !== -1 && row[indexMap.issueNumber]) {
                    primaryId = String(row[indexMap.issueNumber]).trim();
                }
                
                if (!primaryId) continue;

                const item = {};
                Object.keys(indexMap).forEach(key => {
                    let rawVal = indexMap[key] !== -1 ? row[indexMap[key]] : '';
                    item[key] = parseExcelCell(rawVal, HEADER_CONFIG[key].type);
                });
                
                item.contractNumber = primaryId;
                toImport.push(item);
            }

            if (toImport.length === 0) throw new Error('لم يتم العثور على أسطر صالحة للاستيراد');

            setStatus(`جاري مزامنة ${toImport.length} عقد مع السجل...`, 'info');
            const res = await apiCall('bulkImport', { contracts: toImport });
            setStatus(`✅ اكتمل الرفع بنجاح: تمت إضافة ${res.added}، وتخطي ${res.skipped} مكرر`, 'success');
            loadContracts();
        } catch (err) {
            setStatus('❌ فشل في معالجة أو رفع الملف: ' + err.message, 'error');
        }
        e.target.value = ''; 
    });
</script>
</body>
</html>
