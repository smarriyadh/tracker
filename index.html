<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Tracker</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        h1 { color: #1e3c72; }
        .toolbar { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 8px 16px; background: #1e3c72; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .employee-box { margin-bottom: 20px; padding: 10px; background: #e9ecef; border-radius: 8px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #1e3c72; color: white; }
        .status { padding: 10px; margin: 10px 0; border-radius: 6px; background: #e9ecef; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 500px; max-width: 90%; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 Contract Progress Tracker</h1>
    <div class="employee-box">
        <label>👤 Your name:</label>
        <input type="text" id="employeeName" placeholder="Enter your name" style="width: 200px;">
    </div>
    <div id="statusMessage" class="status">Loading...</div>
    <div class="toolbar">
        <button id="refreshBtn">🔄 Refresh</button>
        <button id="addBtn">➕ Add Contract</button>
        <button id="importBtn">📂 Import Excel/CSV</button>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
    </div>
    <div style="overflow-x: auto;">
        <table id="contractsTable">
            <thead><tr><th>Contract #</th><th>Client</th><th>Profession</th><th>Status</th><th>Legacy</th><th>Amount</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="7">Loading...</td></tr></tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Add Contract</h2>
        <form id="contractForm">
            <div class="form-group"><label>Contract Number *</label><input type="text" id="contractNumber" required></div>
            <div class="form-group"><label>Client Name</label><input type="text" id="clientName"></div>
            <div class="form-group"><label>Profession</label><input type="text" id="profession"></div>
            <div class="form-group"><label>Nationality</label><input type="text" id="nationality"></div>
            <div class="form-group"><label>Amount Due</label><input type="number" id="amountDue"></div>
            <div class="form-group"><label>Contract Status</label>
                <select id="contractStatus">
                    <option>New</option><option>Visa Processing</option><option>Worker Arrived</option>
                    <option>Contract Started</option><option>Completed</option><option>Cancelled</option>
                </select>
            </div>
            <div class="form-group"><label>Legacy Status</label><input type="text" id="legacyStatus"></div>
            <div class="form-group"><label>Start Date</label><input type="date" id="startDate"></div>
            <div class="form-group"><label>Recruitment Duration</label><input type="text" id="recruitmentDuration"></div>
            <div class="form-group"><label>Serial</label><input type="text" id="serial"></div>
            <div class="form-group"><label>Employer ID</label><input type="text" id="employerId"></div>
            <div class="form-group"><label>Issue Number</label><input type="text" id="issueNumber"></div>
            <div class="form-actions" style="margin-top:20px; text-align:right">
                <button type="button" id="cancelModalBtn">Cancel</button>
                <button type="submit">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxjOmkYuqMYHIvuk_hPkpuUjXU-2mZKBDvOeBuTuiXZYzJzirT3xIObkhD-Eur88FE/exec'; // <--- REPLACE WITH YOUR DEPLOYED WEB APP URL

    let currentEditNumber = null;
    let contractsData = [];

    function setStatus(msg, isError) {
        const el = document.getElementById('statusMessage');
        el.innerText = msg;
        el.className = 'status ' + (isError ? 'error' : 'success');
        setTimeout(() => { if (!isError) el.className = 'status'; }, 3000);
    }

    async function apiCall(action, body = null) {
        let url = `${API_URL}?action=${action}`;
        const options = { method: 'GET' };
        if (body) {
            options.method = 'POST';
            // Use text/plain to avoid CORS preflight
            options.headers = { 'Content-Type': 'text/plain' };
            options.body = JSON.stringify(body);
        }
        const response = await fetch(url, options);
        const json = await response.json();
        if (!json.success) throw new Error(json.error || 'API error');
        return json.data;
    }

    async function loadContracts() {
        setStatus('Loading...');
        try {
            contractsData = await apiCall('getContracts');
            renderTable(contractsData);
            setStatus(`✅ ${contractsData.length} contracts loaded`);
        } catch (err) {
            setStatus('Error: ' + err.message, true);
            console.error(err);
        }
    }

    function renderTable(contracts) {
        const tbody = document.getElementById('tableBody');
        if (!contracts.length) { tbody.innerHTML = '<tr><td colspan="7">No contracts found</td></tr>'; return; }
        tbody.innerHTML = contracts.map(c => `
            <tr>
                <td>${escapeHtml(c.contractNumber)}</td>
                <td>${escapeHtml(c.clientName)}</td>
                <td>${escapeHtml(c.profession)}</td>
                <td>${escapeHtml(c.contractStatus)}</td>
                <td>${escapeHtml(c.legacyStatus)}</td>
                <td>${escapeHtml(c.amountDue)}</td>
                <td><button class="edit-btn" data-id="${escapeHtml(c.contractNumber)}">Edit</button></td>
            </tr>
        `).join('');
        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id)));
    }

    function openAddModal() { currentEditNumber = null; clearForm(); document.getElementById('modalTitle').innerText = 'Add Contract'; document.getElementById('modal').style.display = 'flex'; }
    function openEditModal(id) { currentEditNumber = id; const contract = contractsData.find(c => c.contractNumber == id); if(contract) fillForm(contract); document.getElementById('modalTitle').innerText = 'Edit Contract'; document.getElementById('modal').style.display = 'flex'; }
    function clearForm() { document.querySelectorAll('#contractForm input, #contractForm select').forEach(f => f.value = ''); document.getElementById('contractStatus').value = 'New'; }
    function fillForm(c) {
        document.getElementById('contractNumber').value = c.contractNumber || '';
        document.getElementById('clientName').value = c.clientName || '';
        document.getElementById('profession').value = c.profession || '';
        document.getElementById('nationality').value = c.nationality || '';
        document.getElementById('amountDue').value = c.amountDue || '';
        document.getElementById('contractStatus').value = c.contractStatus || 'New';
        document.getElementById('legacyStatus').value = c.legacyStatus || '';
        document.getElementById('startDate').value = c.startDate || '';
        document.getElementById('recruitmentDuration').value = c.recruitmentDuration || '';
        document.getElementById('serial').value = c.serial || '';
        document.getElementById('employerId').value = c.employerId || '';
        document.getElementById('issueNumber').value = c.issueNumber || '';
    }

    async function saveContract() {
        const emp = document.getElementById('employeeName').value.trim();
        if (!emp) { alert('Enter your name'); return; }
        const contract = {
            contractNumber: document.getElementById('contractNumber').value.trim(),
            clientName: document.getElementById('clientName').value.trim(),
            profession: document.getElementById('profession').value.trim(),
            nationality: document.getElementById('nationality').value.trim(),
            amountDue: document.getElementById('amountDue').value,
            contractStatus: document.getElementById('contractStatus').value,
            legacyStatus: document.getElementById('legacyStatus').value.trim(),
            startDate: document.getElementById('startDate').value,
            recruitmentDuration: document.getElementById('recruitmentDuration').value.trim(),
            serial: document.getElementById('serial').value.trim(),
            employerId: document.getElementById('employerId').value.trim(),
            issueNumber: document.getElementById('issueNumber').value.trim()
        };
        if (!contract.contractNumber) { alert('Contract number required'); return; }
        try {
            if (currentEditNumber) {
                await apiCall('updateContract', contract);
                setStatus('Contract updated');
            } else {
                await apiCall('addContract', contract);
                setStatus('Contract added');
            }
            closeModal();
            loadContracts();
        } catch (err) { alert('Save error: ' + err.message); }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function importFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        let rows = [];
        if (ext === 'csv') {
            const text = await file.text();
            rows = text.split(/\r?\n/).map(line => line.split(',').map(cell => cell.trim().replace(/^"|"$/g, '')));
        } else if (ext === 'xlsx' || ext === 'xls') {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        } else { alert('Unsupported file'); return; }
        if (rows.length < 2) { alert('No data rows'); return; }
        const headers = rows[0].map(cell => String(cell || '').trim());
        const expected = ['المسلسل','رقم العقد','هوية صاحب العمل','رقم الصادر','المهنة','الجنسية','المبلغ المستحق','مدة الاستقدام','حالة العقد','تاريخ بداية العقد','اسم العميل','الحالة'];
        for (let i=0; i<expected.length; i++) {
            if (headers[i] !== expected[i]) { alert(`Header mismatch: expected "${expected[i]}" got "${headers[i]}"`); return; }
        }
        const contracts = [];
        for (let i=1; i<rows.length; i++) {
            const r = rows[i];
            if (r.length < 12) continue;
            contracts.push({
                serial: r[0]?.toString().trim() || '',
                contractNumber: r[1]?.toString().trim() || '',
                employerId: r[2]?.toString().trim() || '',
                issueNumber: r[3]?.toString().trim() || '',
                profession: r[4]?.toString().trim() || '',
                nationality: r[5]?.toString().trim() || '',
                amountDue: r[6]?.toString().trim() || '',
                recruitmentDuration: r[7]?.toString().trim() || '',
                contractStatus: r[8]?.toString().trim() || '',
                startDate: r[9]?.toString().trim() || '',
                clientName: r[10]?.toString().trim() || '',
                legacyStatus: r[11]?.toString().trim() || ''
            });
        }
        const emp = document.getElementById('employeeName').value.trim();
        if (!emp) { alert('Enter your name'); return; }
        setStatus('Importing...');
        try {
            const result = await apiCall('bulkImport', { contracts, employeeName: emp });
            alert(`Imported ${result.added} new, skipped ${result.skipped} duplicates.`);
            loadContracts();
        } catch (err) { alert('Import error: ' + err.message); setStatus('Import failed', true); }
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    document.getElementById('refreshBtn').onclick = loadContracts;
    document.getElementById('addBtn').onclick = openAddModal;
    document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = e => { if(e.target.files.length) importFile(e.target.files[0]); e.target.value = ''; };
    document.getElementById('cancelModalBtn').onclick = closeModal;
    document.getElementById('contractForm').onsubmit = e => { e.preventDefault(); saveContract(); };
    window.addEventListener('click', e => { if(e.target === document.getElementById('modal')) closeModal(); });
    window.onload = loadContracts;
</script>
</body>
</html>
