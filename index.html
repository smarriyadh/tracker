<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - إدارة العقود</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
        
        /* Login Screen */
        #loginScreen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #loginScreen input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-size: 16px; }
        #loginScreen button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        h2 { border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0; display: flex; justify-content: space-between; align-items: center;}
        .toolbar { display: flex; gap: 15px; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-upload { background: #8b5cf6; } .btn-upload:hover { background: #7c3aed; }
        .btn-refresh { background: #3b82f6; } .btn-refresh:hover { background: #2563eb; }
        .btn-save { background: #10b981; padding: 6px 12px; font-size: 12px;} .btn-save:hover { background: #059669; }
        
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
        th, td { border-bottom: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; padding: 10px; text-align: right; }
        th { background: #f1f5f9; font-weight: 600; position: sticky; top: 0; }
        tbody tr:hover { background: #f8fafc; }
        
        select { padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1; outline: none; font-family: inherit; }
        
        .status-msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; text-align: center; display: none; font-weight: bold; }
        .success { background: #dcfce3; color: #166534; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        .info { background: #e0f2fe; color: #075985; display: block; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>🔒 تسجيل الدخول للموظفين</h2>
    <p style="color:#64748b; font-size: 14px;">الرجاء إدخال كلمة المرور للوصول إلى السجل.</p>
    <input type="password" id="pinInput" placeholder="كلمة المرور...">
    <button onclick="login()">دخول</button>
    <div id="loginError" style="color:red; margin-top:10px; font-size:14px; display:none;">كلمة المرور خاطئة</div>
</div>

<div class="container" id="mainApp">
    <h2>
        📋 سجل العقود الشامل
        <div class="toolbar">
            <button class="btn-refresh" onclick="loadContracts()">🔄 تحديث البيانات</button>
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📂 رفع ملف إكسل (نماذج متعددة)</button>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
        </div>
    </h2>
    
    <div id="statusMsg" class="status-msg"></div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>تحديث</th>
                    <th>الحالة</th>
                    <th>رقم العقد</th>
                    <th>رقم التأشيرة</th>
                    <th>اسم العميل</th>
                    <th>اسم العاملة</th>
                    <th>الجنسية</th>
                    <th>المهنة</th>
                    <th>المبلغ المستحق</th>
                    <th>تاريخ البدء</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="10" style="text-align:center;">جاري تحميل البيانات...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4ucI3qzQcDKmftv6r-uvRWlIdVmM-9P4dP9Ayu3YeMVdgTJwg1dSIL-LU2egF9Xw/exec';
    
    let STAFF_PIN = sessionStorage.getItem('staff_pin');

    // قاموس المترادفات المحسّن لضمان جلب كافة الحقول دون فراغات
    const HEADER_ALIASES = {
        contractNumber: ['رقم العقد', 'رقم_العقد', 'contract no'],
        issueNumber: ['رقم الصادر', 'رقم التاشيرة', 'رقم التأشيرة', 'visa'],
        employerId: ['هوية صاحب العمل', 'رقم الهوية', 'هوية العميل'],
        clientName: ['اسم العميل', 'العميل'],
        workerName: ['اسم الخادمة', 'اسم العاملة', 'worker'],
        nationality: ['الجنسية', 'الدولة'],
        profession: ['المهنة', 'مهنة'],
        amountDue: ['المبلغ المستحق', 'السعر المعتمد', 'السعر'],
        duration: ['مدة الاستقدام', 'مدة العقد', 'المدة'],
        startDate: ['تاريخ بداية العقد', 'تاريخ التقديم', 'تاريخ البدء'],
        arrivalDate: ['تاريخ الوصول', 'تاريخ وصول'],
        contractStatus: ['حالة العقد', 'حالة_العقد', 'الحالة']
    };

    const SYSTEM_STATUSES = ['جديد', 'قيد المعالجة', 'تم الوصول', 'بدء العقد', 'مكتمل', 'ملغي'];

    if (STAFF_PIN) { showApp(); loadContracts(); }

    function login() {
        STAFF_PIN = document.getElementById('pinInput').value;
        sessionStorage.setItem('staff_pin', STAFF_PIN);
        showApp();
        loadContracts();
    }

    function showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
    }

    function setStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.innerText = msg;
        el.className = `status-msg ${type}`;
        if (type !== 'error') setTimeout(() => el.className = 'status-msg', 5000);
    }

    async function apiCall(action, payload = null) {
        const url = `${API_URL}?action=${action}&token=${encodeURIComponent(STAFF_PIN)}`;
        const options = { redirect: 'follow' };
        if (payload) {
            options.method = 'POST';
            options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
            options.body = JSON.stringify(payload);
        }
        const response = await fetch(url, options);
        const json = await response.json();
        if (!json.success) {
            if (json.error.includes("غير مصرح")) {
                sessionStorage.removeItem('staff_pin');
                location.reload();
            }
            throw new Error(json.error);
        }
        return json.data;
    }

    // دالة مخصصة حصرياً لتنظيف التواريخ وفصل الوقت دون التأثير على الأسماء والنصوص
    function cleanDateFormat(val) {
        if (!val) return '';
        let str = String(val).trim();
        
        if (str.includes(' ')) {
            str = str.split(' ')[0];
        }

        const num = parseFloat(str);
        if (!isNaN(num) && num > 25000 && num < 70000) { 
            const d = new Date((num - 25569) * 86400 * 1000);
            d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
            return d.toLocaleDateString();
        }
        if (/^\d{6,}\/\d+\/?$/.test(str)) {
            const clean = str.replace(/[\/]/g, ''); 
            return `${clean.substring(2, 6)}-${clean.substring(6).padStart(2,'0')}-${clean.substring(0, 2).padStart(2,'0')}`;
        }
        return str.split('T')[0];
    }

    // دالة لتنظيف النصوص العامة (مثل الأسماء) لتبقى كاملة دون تقطيع
    function cleanGeneralFormat(val) {
        if (!val) return '';
        return String(val).trim();
    }

    async function loadContracts() {
        setStatus('جاري جلب البيانات...', 'info');
        try {
            const contracts = await apiCall('getContracts');
            const tbody = document.getElementById('tableBody');
            if (!contracts.length) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">لا توجد بيانات حالياً</td></tr>';
                return;
            }
            
            tbody.innerHTML = contracts.map(c => {
                const currentStatus = String(c.contractStatus || 'جديد').trim();
                let opts = SYSTEM_STATUSES.map(s => `<option value="${s}" ${currentStatus === s ? 'selected' : ''}>${s}</option>`).join('');
                if (!SYSTEM_STATUSES.includes(currentStatus)) opts += `<option value="${currentStatus}" selected>${currentStatus}</option>`;

                return `
                <tr>
                    <td><button class="btn-save" data-id="${c.contractNumber}">حفظ</button></td>
                    <td><select class="status-select" data-id="${c.contractNumber}">${opts}</select></td>
                    <td><strong>${cleanGeneralFormat(c.contractNumber)}</strong></td>
                    <td>${cleanGeneralFormat(c.issueNumber)}</td>
                    <td>${cleanGeneralFormat(c.clientName)}</td>
                    <td>${cleanGeneralFormat(c.workerName)}</td>
                    <td>${cleanGeneralFormat(c.nationality)}</td>
                    <td>${cleanGeneralFormat(c.profession)}</td>
                    <td>${cleanGeneralFormat(c.amountDue)}</td>
                    <td dir="ltr" style="text-align:right;">${cleanDateFormat(c.startDate)}</td>
                </tr>
            `}).join('');

            document.querySelectorAll('.btn-save').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const newStatus = document.querySelector(`.status-select[data-id="${id}"]`).value;
                    setStatus(`جاري حفظ حالة ${id}...`, 'info');
                    try {
                        await apiCall('updateStatus', { contractNumber: id, newStatus: newStatus, updatedBy: 'موظف النظام' });
                        setStatus('✅ تم التحديث بنجاح', 'success');
                    } catch (err) { setStatus('❌ خطأ: ' + err.message, 'error'); }
                });
            });
            setStatus('✅ تم تحميل السجل بنجاح', 'success');
        } catch (err) { setStatus('❌ فشل التحميل: ' + err.message, 'error'); }
    }

document.getElementById('fileInput').addEventListener('change', async (e) => {
    if (!e.target.files.length) return;
    const file = e.target.files[0];
    setStatus('جاري معالجة الملف...', 'info');
    
    try {
        const data = await file.arrayBuffer();
        // التعديل الهام هنا: raw: true يمنع المكتبة من تحويل الأرقام لتواريخ تلقائياً
        const workbook = XLSX.read(data, { raw: true });
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { 
            header: 1, 
            defval: "", 
            raw: true 
        });
        
        if (rows.length < 2) throw new Error('الملف فارغ');

        const fileHeaders = rows[0].map(h => String(h).trim().toLowerCase());
        const indexMap = {};

        Object.keys(HEADER_ALIASES).forEach(key => {
            indexMap[key] = fileHeaders.findIndex(h => HEADER_ALIASES[key].some(alias => h.includes(alias.toLowerCase())));
        });

        const toImport = [];
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const item = {};
            
            Object.keys(indexMap).forEach(key => {
                let val = indexMap[key] !== -1 ? row[indexMap[key]] : '';
                
                // التواريخ فقط هي التي نعالجها برمجياً
                if (key === 'startDate' || key === 'arrivalDate') {
                    item[key] = cleanDateFormat(val); 
                } 
                // المبلغ وباقي النصوص: نأخذ القيمة الخام كما هي (سلسلة نصية)
                else {
                    item[key] = (val !== null && val !== undefined) ? String(val).trim() : '';
                }
            });
            
            if (item.contractNumber) toImport.push(item);
        }

        const res = await apiCall('bulkImport', { contracts: toImport });
        setStatus(`✅ تمت العملية بنجاح: ${res.added} مضاف، ${res.skipped} مكرر`, 'success');
        loadContracts();
    } catch (err) {
        setStatus('❌ خطأ في المعالجة: ' + err.message, 'error');
    }
});
                
                item.contractNumber = primaryId; 
                toImport.push(item);
            }

            setStatus(`جاري مزامنة ${toImport.length} عقد مع السجل...`, 'info');
            const res = await apiCall('bulkImport', { contracts: toImport });
            setStatus(`✅ اكتمل الرفع: تمت إضافة ${res.added}، وتخطي ${res.skipped} مكرر`, 'success');
            loadContracts(); 
        } catch (err) {
            setStatus('❌ فشل الرفع: ' + err.message, 'error');
        }
        e.target.value = '';
    });
</script>
</body>
</html>
