<!DOCTYPE html>
<html lang="en">
9<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Sheet Comparator</title>
    <!-- SheetJS Library for reading Excel files in the browser -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --border-color: #dee2e6;
            --match-bg: #d4edda;
            --match-text: #155724;
            --diff-bg: #f8d7da;
            --diff-text: #721c24;
            --missing-bg: #e2e3e5;
            --missing-text: #383d41;
            --cell-diff-bg: #ffcccc;
            --cell-diff-border: #ff0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            text-align: center;
            background: #fafafa;
        }

        .file-input-wrapper label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #495057;
        }

        input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
        }

        .btn-compare {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-compare:hover {
            background-color: #0056b3;
        }

        .btn-compare:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        #loading {
            text-align: center;
            display: none;
            margin: 20px 0;
            font-weight: bold;
            color: #007bff;
        }

        .summary {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .summary-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .badge-match { background: var(--match-bg); color: var(--match-text); }
        .badge-diff { background: var(--diff-bg); color: var(--diff-text); }
        .badge-missing { background: var(--missing-bg); color: var(--missing-text); }

        .results-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: #e9ecef;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .row-match { background-color: var(--match-bg); }
        .row-diff { background-color: #fff; }
        .row-missing-1 { background-color: var(--missing-bg); }
        .row-missing-2 { background-color: var(--missing-bg); }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .status-match { background: var(--match-bg); color: var(--match-text); }
        .status-diff { background: var(--diff-bg); color: var(--diff-text); }
        .status-only-1 { background: #cce5ff; color: #004085; }
        .status-only-2 { background: #fff3cd; color: #856404; }

        .cell-content {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .cell-diff {
            background-color: var(--cell-diff-bg);
            border: 1px solid var(--cell-diff-border);
            border-radius: 3px;
            padding: 2px 4px;
            font-weight: bold;
            color: #900;
        }

        .empty-cell {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Excel Sheet Comparator</h1>
    
    <div class="input-group">
        <div class="file-input-wrapper">
            <label for="file1">Sheet 1 (Original / Reference)</label>
            <input type="file" id="file1" accept=".xlsx, .xls, .csv">
        </div>
        <div class="file-input-wrapper">
            <label for="file2">Sheet 2 (New / Comparison)</label>
            <input type="file" id="file2" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <button class="btn-compare" id="compareBtn" onclick="compareFiles()">Compare Sheets</button>
    
    <div id="loading">Processing files, please wait...</div>

    <div id="summary" class="summary" style="display: none;"></div>

    <div class="results-container">
        <table id="resultsTable" style="display: none;">
            <thead>
                <tr>
                    <th style="width: 60px;">Line #</th>
                    <th style="width: 42%;">Sheet 1 Content</th>
                    <th style="width: 42%;">Sheet 2 Content</th>
                    <th style="width: 10%;">Status</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    // Helper function to read an Excel/CSV file and return an array of rows (array of arrays)
    function readFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    // Get the first sheet
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    // Convert to array of arrays (header: 1), keeping empty cells as empty strings
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                    resolve(jsonData);
                } catch (error) {
                    reject(error);
                }
            };
            reader.onerror = (error) => reject(error);
            reader.readAsArrayBuffer(file);
        });
    }

    // Format a row array into HTML, highlighting differing cells
    function formatRow(row, compareRow = null) {
        if (!row || row.length === 0) {
            return '<span class="empty-cell">[Empty Line]</span>';
        }
        
        return row.map((cell, index) => {
            const cellStr = String(cell === null || cell === undefined ? "" : cell).trim();
            const compareCell = compareRow ? String(compareRow[index] === null || compareRow[index] === undefined ? "" : compareRow[index]).trim() : null;
            
            let displayValue = cellStr === "" ? '<span class="empty-cell">[blank]</span>' : escapeHtml(cellStr);
            
            // If comparing and the cells are different, highlight it
            if (compareRow !== null && cellStr !== compareCell) {
                return `<span class="cell-diff">${displayValue}</span>`;
            }
            return `<span class="cell-content">${displayValue}</span>`;
        }).join(' | '); // Using ' | ' as a visual separator between columns for compact viewing
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function compareFiles() {
        const file1Input = document.getElementById('file1');
        const file2Input = document.getElementById('file2');
        const compareBtn = document.getElementById('compareBtn');
        const loading = document.getElementById('loading');
        const resultsTable = document.getElementById('resultsTable');
        const resultsBody = document.getElementById('resultsBody');
        const summaryDiv = document.getElementById('summary');

        if (!file1Input.files[0] || !file2Input.files[0]) {
            alert("Please select both files before comparing.");
            return;
        }

        // UI State: Loading
        compareBtn.disabled = true;
        loading.style.display = 'block';
        resultsTable.style.display = 'none';
        summaryDiv.style.display = 'none';
        resultsBody.innerHTML = '';

        try {
            // Read both files concurrently
            const [data1, data2] = await Promise.all([
                readFile(file1Input.files[0]),
                readFile(file2Input.files[1] || file2Input.files[0]) // Fallback just in case
            ]);

            const maxRows = Math.max(data1.length, data2.length);
            let matchCount = 0;
            let diffCount = 0;
            let onlyIn1Count = 0;
            let onlyIn2Count = 0;

            // Compare line by line
            for (let i = 0; i < maxRows; i++) {
                const row1 = data1[i] || [];
                const row2 = data2[i] || [];
                const lineNum = i + 1;

                // Check if rows are exactly identical
                const isMatch = JSON.stringify(row1) === JSON.stringify(row2);
                
                const tr = document.createElement('tr');
                let statusHtml = '';
                let rowClass = '';

                if (isMatch) {
                    matchCount++;
                    rowClass = 'row-match';
                    statusHtml = '<span class="status-badge status-match">Match</span>';
                    tr.innerHTML = `
                        <td>${lineNum}</td>
                        <td>${formatRow(row1)}</td>
                        <td>${formatRow(row2)}</td>
                        <td>${statusHtml}</td>
                    `;
                } else {
                    const isEmpty1 = row1.length === 0 || (row1.length === 1 && row1[0] === "");
                    const isEmpty2 = row2.length === 0 || (row2.length === 1 && row2[0] === "");

                    if (isEmpty1 && !isEmpty2) {
                        onlyIn2Count++;
                        rowClass = 'row-missing-1';
                        statusHtml = '<span class="status-badge status-only-2">Only in Sheet 2</span>';
                        tr.innerHTML = `
                            <td>${lineNum}</td>
                            <td><span class="empty-cell">[Line does not exist]</span></td>
                            <td>${formatRow(row2)}</td>
                            <td>${statusHtml}</td>
                        `;
                    } else if (!isEmpty1 && isEmpty2) {
                        onlyIn1Count++;
                        rowClass = 'row-missing-2';
                        statusHtml = '<span class="status-badge status-only-1">Only in Sheet 1</span>';
                        tr.innerHTML = `
                            <td>${lineNum}</td>
                            <td>${formatRow(row1)}</td>
                            <td><span class="empty-cell">[Line does not exist]</span></td>
                            <td>${statusHtml}</td>
                        `;
                    } else {
                        diffCount++;
                        rowClass = 'row-diff';
                        statusHtml = '<span class="status-badge status-diff">Different</span>';
                        // Pass row2 to formatRow to highlight specific cell differences
                        tr.innerHTML = `
                            <td>${lineNum}</td>
                            <td>${formatRow(row1, row2)}</td>
                            <td>${formatRow(row2, row1)}</td>
                            <td>${statusHtml}</td>
                        `;
                    }
                }

                tr.className = rowClass;
                resultsBody.appendChild(tr);
            }

            // Update Summary
            summaryDiv.innerHTML = `
                <span class="summary-badge badge-match">✅ Matches: ${matchCount}</span>
                <span class="summary-badge badge-diff">⚠️ Different: ${diffCount}</span>
                <span class="summary-badge badge-missing">➖ Only in Sheet 1: ${onlyIn1Count}</span>
                <span class="summary-badge badge-missing">➕ Only in Sheet 2: ${onlyIn2Count}</span>
            `;
            summaryDiv.style.display = 'flex';
            resultsTable.style.display = 'table';

        } catch (error) {
            console.error(error);
            alert("An error occurred while reading the files. Please ensure they are valid Excel or CSV files.");
        } finally {
            // UI State: Reset
            compareBtn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
